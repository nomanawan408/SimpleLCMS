name: CI/CD Pipeline

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main]

env:
  PHP_VERSION: '8.3'
  NODE_VERSION: '20'

jobs:
  # ─── CI: Test & Build ───────────────────────────────────────
  ci:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: simplelaw_test
          MYSQL_USER: simplelaw
          MYSQL_PASSWORD: simplelaw_pass
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, bcmath, pdo_mysql, curl, zip, gd
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build frontend assets
        run: npm run build

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run migrations (CI local DB)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: simplelaw_test
          DB_USERNAME: simplelaw
          DB_PASSWORD: simplelaw_pass
        run: php artisan migrate:fresh --seed --force

      - name: Run tests (CI local DB)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: simplelaw_test
          DB_USERNAME: simplelaw
          DB_PASSWORD: simplelaw_pass

        run: php artisan test --parallel

      - name: Upload build artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: public/build
          retention-days: 3

  # ─── Deploy to Hostinger ────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            cd ${{ secrets.HOSTINGER_PATH }}

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Install production dependencies only
            composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

            # Migrations are protected by a repository secret. If you have set
            # the secret `RUN_MIGRATIONS=true`, the following step will run.
            if [ "${{ secrets.RUN_MIGRATIONS }}" = "true" ] && [ "${{ secrets.MIGRATION_CONFIRMATION }}" = "true" ]; then
              php artisan migrate --force
            else
              echo "Skipping automatic migrations on production to avoid data changes."
              echo "To run migrations automatically, set secrets RUN_MIGRATIONS=true and MIGRATION_CONFIRMATION=true and approve the 'production' environment in repository settings."
            fi

            # Clear and rebuild caches
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "Deployment complete."
